<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Log Out - 貍想教育創新學院</title>
<style>
  /* 基本重置與全螢幕設定 */
  body { margin: 0; padding: 0; background: black; color: #0F0; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
  
  /* 數位瀑布畫布 */
  canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; transition: opacity 1.5s ease-in-out; }
  
  /* 中央輸入介面 */
  #ui-layer { 
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
    z-index: 2; text-align: center; background: rgba(0, 20, 0, 0.85); 
    padding: 40px 50px; border: 1px solid #0F0; box-shadow: 0 0 30px #0F0; 
    border-radius: 5px; backdrop-filter: blur(5px); transition: opacity 0.5s ease-out;
  }
  
  /* 標題與閃爍效果 */
  h1 { font-size: 2em; letter-spacing: 3px; text-shadow: 0 0 10px #0F0; margin-bottom: 10px; animation: glitch 3s infinite; }
  p { font-size: 1.1em; color: #8f8; margin-bottom: 30px; letter-spacing: 1px; }
  
  /* 密碼輸入框 */
  input { 
    background: black; color: #0F0; border: 1px solid #0F0; padding: 15px; 
    font-size: 1.5em; text-align: center; font-family: 'Courier New', monospace; 
    outline: none; width: 80%; letter-spacing: 5px; transition: 0.3s;
  }
  input:focus { box-shadow: 0 0 15px #0F0; background: rgba(0, 50, 0, 0.5); }
  
  /* 登出按鈕 */
  button { 
    background: transparent; color: #0F0; border: 2px solid #0F0; 
    padding: 12px 30px; font-size: 1.2em; margin-top: 30px; cursor: pointer; 
    font-weight: bold; font-family: 'Courier New', monospace; letter-spacing: 2px;
    transition: 0.3s;
  }
  button:hover { background: #0F0; color: black; box-shadow: 0 0 20px #0F0; }

  /* 成功登出後的畫面 (影片與結語) */
  #success-screen { 
    display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
    background: #050505; z-index: 3; flex-direction: column; 
    justify-content: center; align-items: center; opacity: 0; transition: opacity 2s ease-in-out;
  }
  
  /* HTML5 影片容器設定 */
  .video-container {
    width: 80%; max-width: 800px;
    box-shadow: 0 0 40px rgba(0, 255, 0, 0.4); border-radius: 10px; overflow: hidden;
    background: #000;
  }
  
  video { width: 100%; display: block; outline: none; }
  
  /* 延遲浮現的最終結語 */
  .welcome-text { 
    font-size: 2em; margin-top: 40px; color: #fff; letter-spacing: 4px;
    text-shadow: 0 0 20px #0F0, 0 0 10px #0F0; font-weight: bold;
    text-align: center; line-height: 1.5;
    opacity: 0; /* 初始隱藏 */
    animation: fadeInText 2s ease-in-out forwards;
    animation-delay: 3.5s; /* 延遲 3.5 秒才開始浮現，配合影片節奏 */
  }

  /* 動畫設定 */
  @keyframes glitch {
    0% { opacity: 1; transform: translate(0); }
    2% { opacity: 0.8; transform: translate(-2px, 2px); }
    4% { opacity: 1; transform: translate(2px, -2px); }
    6% { opacity: 0.9; transform: translate(0); }
    100% { opacity: 1; transform: translate(0); }
  }
  @keyframes fadeInText { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

  <canvas id="matrix"></canvas>

  <div id="ui-layer">
    <h1>系統警告：黃磚路正在瓦解</h1>
    <p>Please enter the final coordinate to LOG OUT.</p>
    <input type="text" id="pwd" placeholder="___.___.___" autocomplete="off">
    <br>
    <button onclick="checkPwd()">[ 確 認 傳 送 ]</button>
  </div>

  <div id="success-screen">
    <div class="video-container">
      <video id="finalVideo" playsinline preload="auto">
        <source src="https://www.dropbox.com/scl/fi/35lcvi35gkiet78ejmcop/Untitled-design.mp4?rlkey=53y438tt963av596ibdqlaaql&st=4dqjz1y6&raw=1" type="video/mp4">
      </video>
    </div>
    
    <div class="welcome-text">
      貍開黃磚路，<br>請至西門町實體伺服器，貍來！
    </div>
  </div>

  <script>
    // --- 駭客任務代碼瀑布特效 ---
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*黃磚路正在瓦解波玻貍登出西門町'.split('');
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = [];
    for(let x = 0; x < columns; x++) drops[x] = 1;

    let matrixInterval = setInterval(drawMatrix, 35);

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0F0';
      ctx.font = fontSize + 'px Courier New';

      for(let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }

    // --- 密碼驗證邏輯 ---
    function checkPwd() {
      const pwd = document.getElementById('pwd').value.trim();
      
      // ✅ 您可在此處修改您的通關密碼
      const validPasswords = ['127.0.0.1', '3652', '11.2233', '黃磚路在腳下'];

      if(validPasswords.includes(pwd)) {
        // 1. 隱藏輸入介面
        const uiLayer = document.getElementById('ui-layer');
        uiLayer.style.opacity = '0';
        setTimeout(() => { uiLayer.style.display = 'none'; }, 500);
        
        // 2. 停止瀑布特效並淡出
        clearInterval(matrixInterval);
        canvas.style.opacity = '0';
        
        // 3. 延遲 1 秒後，淡入影片區塊並觸發自動播放
        setTimeout(() => {
          const successScreen = document.getElementById('success-screen');
          successScreen.style.display = 'flex';
          
          setTimeout(() => { 
            successScreen.style.opacity = '1'; 
            // 透過 JavaScript 觸發影片播放
            const finalVideo = document.getElementById('finalVideo');
            finalVideo.play().catch(e => console.log("影片自動播放失敗，可能是瀏覽器限制：", e));
          }, 50);
        }, 1000);
      } else {
        alert('❌ 座標錯誤：無法鎖定傳送目標 / Access Denied');
        document.getElementById('pwd').value = '';
      }
    }

    // 支援按 Enter 鍵送出
    document.getElementById('pwd').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') { checkPwd(); }
    });

    // 視窗縮放時自動調整畫布大小
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>

</body>
</html>
