<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>System Log Out - 貍想教育創新學院</title>
<style>
  /* === 基本重置與全螢幕設定 === */
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; background: black; color: #0F0; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
  
  /* 數位瀑布畫布 */
  canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; transition: opacity 1.5s ease-in-out; }
  
  /* === 中央輸入介面 (UI Layer) === */
  #ui-layer { 
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
    z-index: 2; text-align: center; background: rgba(0, 15, 0, 0.85); 
    padding: 40px 30px; border: 1px solid #0F0; box-shadow: 0 0 30px #0F0; 
    border-radius: 8px; backdrop-filter: blur(5px); transition: opacity 0.5s ease-out;
    width: 95%; max-width: 650px; 
  }
  
  h1 { font-size: 2.2rem; letter-spacing: 3px; text-shadow: 0 0 15px #0F0; margin: 0 0 15px 0; animation: glitch 3s infinite; line-height: 1.3; }
  p { font-size: 1.1rem; color: #8f8; margin-bottom: 25px; letter-spacing: 1.5px; line-height: 1.4; }
  
  /* === 一格格密碼輸入區設計 === */
  .coord-container {
    border: 1px solid #0F0;
    padding: 20px 10px;
    border-radius: 6px;
    margin-bottom: 25px;
    background: rgba(0, 30, 0, 0.4);
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .coord-row {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
  }

  .coord-box { 
    background: black; color: #0F0; border: 1px solid #0F0; 
    width: 35px; height: 45px; font-size: 1.5rem; text-align: center; 
    font-family: 'Courier New', monospace; border-radius: 4px;
    transition: 0.2s; outline: none;
  }
  .coord-box:focus { box-shadow: 0 0 10px #0F0; background: rgba(0, 60, 0, 0.6); transform: scale(1.05); border-width: 2px; }
  
  .symbol { color: #8f8; font-size: 1.4rem; font-family: 'Courier New', monospace; margin: 0 2px; text-shadow: 0 0 5px #0F0; font-weight: bold; }

  button { 
    background: transparent; color: #0F0; border: 1px solid #0F0; 
    padding: 15px 30px; font-size: 1.3rem; cursor: pointer; 
    font-weight: bold; font-family: 'Courier New', monospace; letter-spacing: 5px;
    transition: 0.3s; border-radius: 6px; width: 100%;
  }
  button:hover { background: #0F0; color: black; box-shadow: 0 0 20px #0F0; }

  /* === 成功登出後的畫面 (影片與結語) === */
  #success-screen { 
    display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
    background: #050505; z-index: 3; flex-direction: column; 
    justify-content: center; align-items: center; opacity: 0; transition: opacity 2s ease-in-out;
    padding: 20px;
  }
  
  .video-container {
    width: 100%; max-width: 800px; aspect-ratio: 16 / 9; 
    box-shadow: 0 0 40px rgba(0, 255, 0, 0.3); border-radius: 10px; overflow: hidden;
    background: #000; display: flex; justify-content: center; align-items: center;
  }
  
  video { width: 100%; height: 100%; outline: none; object-fit: contain; }
  
  .welcome-text { 
    font-size: 1.8rem; margin-top: 30px; color: #fff; letter-spacing: 3px;
    text-shadow: 0 0 15px #0F0, 0 0 5px #0F0; font-weight: bold;
    text-align: center; line-height: 1.5;
    opacity: 0; animation: fadeInText 2s ease-in-out forwards; animation-delay: 3.5s; 
  }

  /* === 手機版 RWD 響應式設定 === */
  @media screen and (max-width: 768px) {
    #ui-layer { padding: 30px 15px; }
    h1 { font-size: 1.6rem; }
    p { font-size: 0.9rem; margin-bottom: 20px; }
    .coord-container { padding: 15px 5px; gap: 10px; }
    .coord-row { gap: 3px; }
    .coord-box { width: 28px; height: 38px; font-size: 1.2rem; }
    .symbol { font-size: 1.2rem; margin: 0; }
    button { font-size: 1.2rem; padding: 12px; }
    .welcome-text { font-size: 1.3rem; margin-top: 25px; }
  }

  /* === 動畫設定 === */
  @keyframes glitch {
    0% { opacity: 1; transform: translate(0); }
    2% { opacity: 0.8; transform: translate(-2px, 2px); }
    4% { opacity: 1; transform: translate(2px, -2px); }
    6% { opacity: 0.9; transform: translate(0); }
    100% { opacity: 1; transform: translate(0); }
  }
  @keyframes fadeInText { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

  <canvas id="matrix"></canvas>

  <div id="ui-layer">
    <h1>系統警告：<br>黃磚路正在瓦解</h1>
    <p>Please enter the final coordinate to LOG OUT.</p>
    
    <div class="coord-container">
      <div class="coord-row">
        <input type="text" class="coord-box" maxlength="1" data-index="0">
        <input type="text" class="coord-box" maxlength="1" data-index="1">
        <span class="symbol">.</span>
        <input type="text" class="coord-box" maxlength="1" data-index="2">
        <input type="text" class="coord-box" maxlength="1" data-index="3">
        <input type="text" class="coord-box" maxlength="1" data-index="4">
        <input type="text" class="coord-box" maxlength="1" data-index="5">
        <span class="symbol">&deg; N,</span>
      </div>
      <div class="coord-row">
        <input type="text" class="coord-box" maxlength="1" data-index="6">
        <input type="text" class="coord-box" maxlength="1" data-index="7">
        <input type="text" class="coord-box" maxlength="1" data-index="8">
        <span class="symbol">.</span>
        <input type="text" class="coord-box" maxlength="1" data-index="9">
        <input type="text" class="coord-box" maxlength="1" data-index="10">
        <input type="text" class="coord-box" maxlength="1" data-index="11">
        <input type="text" class="coord-box" maxlength="1" data-index="12">
        <span class="symbol">&deg; E</span>
      </div>
    </div>

    <button onclick="checkPwd()">[ 確 認 傳 送 ]</button>
  </div>

  <div id="success-screen">
    <div class="video-container">
      <video id="finalVideo" playsinline preload="auto">
        <source src="https://www.dropbox.com/scl/fi/qn73nfttjbjvgmcv6xwe5/logout-video.mp4?rlkey=cl13tpq3od6nxt14g16ajqm3y&st=8udbzx2v&raw=1" type="video/mp4">
      </video>
    </div>
    <div class="welcome-text">
      世界就是一場盛大的遊戲－－請前往西門町，尋找起始NPC，開啟新的任務線。
    </div>
  </div>

  <script>
    // --- 駭客任務代碼瀑布特效 ---
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    
    let fontSize = 16;
    let columns, drops;

    function initMatrix() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      columns = Math.floor(canvas.width / fontSize);
      drops = [];
      for(let x = 0; x < columns; x++) drops[x] = Math.random() * -100;
    }
    initMatrix();

    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*黃磚路正在瓦解波玻貍登出西門町'.split('');
    let matrixInterval = setInterval(drawMatrix, 40);

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0F0';
      ctx.font = fontSize + 'px Courier New';

      for(let i = 0; i < drops.length; i++) {
        if(drops[i] * fontSize >= 0) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        }
        if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }

    // --- OTP 方格輸入邏輯 (自動跳格、退格、貼上) ---
    const inputs = document.querySelectorAll('.coord-box');
    
    inputs.forEach((input, index) => {
      // 處理輸入與自動跳到下一格
      input.addEventListener('input', () => {
        // 只保留最後輸入的字元，確保只能輸入一碼數字
        input.value = input.value.replace(/[^0-9]/g, '').slice(-1);
        if (input.value !== '' && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });

      // 處理 Backspace 鍵自動退回上一格，以及 Enter 鍵送出
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && input.value === '') {
          if (index > 0) {
            inputs[index - 1].focus();
            inputs[index - 1].value = ''; // 刪除前一格的內容
          }
        } else if (e.key === 'Enter') {
          checkPwd();
        }
      });

      // 處理智慧貼上功能 (過濾符號，自動填入各格)
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasteData = e.clipboardData.getData('text');
        // 過濾掉所有非數字字元
        const digits = pasteData.replace(/\D/g, ''); 
        
        let currIdx = index;
        for (let i = 0; i < digits.length; i++) {
          if (currIdx < inputs.length) {
            inputs[currIdx].value = digits[i];
            currIdx++;
          }
        }
        // 聚焦到最後一個填入的格子或最後一格
        if (currIdx < inputs.length) {
          inputs[currIdx].focus();
        } else {
          inputs[inputs.length - 1].focus();
        }
      });
    });

    // --- 密碼驗證邏輯 ---
    function checkPwd() {
      // 收集所有方格內的數字
      let pwdRaw = '';
      inputs.forEach(input => pwdRaw += input.value);
      
      // 目標座標：25.0422 N, 121.5080 E => 純數字密碼為 2504221215080
      const targetPwd = '2504221215080';

      if(pwdRaw === targetPwd) {
        // 1. 隱藏輸入介面
        const uiLayer = document.getElementById('ui-layer');
        uiLayer.style.opacity = '0';
        setTimeout(() => { uiLayer.style.display = 'none'; }, 500);
        
        // 2. 停止瀑布特效並淡出
        clearInterval(matrixInterval);
        canvas.style.opacity = '0';
        
        // 3. 淡入影片區塊並觸發自動播放
        setTimeout(() => {
          const successScreen = document.getElementById('success-screen');
          successScreen.style.display = 'flex';
          
          setTimeout(() => { 
            successScreen.style.opacity = '1'; 
            const finalVideo = document.getElementById('finalVideo');
            finalVideo.play().catch(e => console.log("需使用者進一步授權播放", e));
          }, 50);
        }, 1000);
      } else {
        alert('❌ 座標錯誤：無法鎖定傳送目標 / Access Denied');
        // 錯誤時清空所有格子並將游標移回第一格
        inputs.forEach(i => i.value = '');
        inputs[0].focus();
      }
    }

    // 視窗縮放或手機轉向時，動態更新畫布
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const newColumns = Math.floor(canvas.width / fontSize);
      if(newColumns > drops.length) {
          for(let x = drops.length; x < newColumns; x++) drops[x] = 0;
      }
    });
  </script>

</body>
</html>
